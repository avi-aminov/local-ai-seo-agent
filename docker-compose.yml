services:
  backend:
    build:
      context: ./server
    environment:
      PORT: 3000
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      OLLAMA_TIMEOUT_MS: 180000
      REPORT_CACHE_TTL_MS: 900000
    ports:
      - "3001:3000"
    depends_on:
      - ollama

  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:3001/api
    ports:
      - "5174:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
